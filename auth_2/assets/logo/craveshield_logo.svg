<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="badgeGlow" cx="50%" cy="43%" r="58%">
      <stop offset="0%" stop-color="#080A12"/>
      <stop offset="68%" stop-color="#03040A"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textSoft" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#FFFFFF" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- black circular badge -->
  <circle cx="512" cy="512" r="486" fill="url(#badgeGlow)"/>

  <!-- shield outline -->
  <path d="M512 286
           C462 314 410 323 365 329
           C363 399 371 468 399 527
           C424 580 463 621 512 652
           C561 621 600 580 625 527
           C653 468 661 399 659 329
           C614 323 562 314 512 286Z"
        stroke="#52F3F2" stroke-width="24" stroke-linejoin="round" fill="none" filter="url(#softGlow)"/>

  <!-- full filled flame, reference-like -->
  <path d="M515 402
           C498 421 495 445 503 465
           C488 458 477 444 477 427
           C453 454 438 484 438 519
           C438 564 471 596 512 596
           C553 596 586 564 586 519
           C586 481 566 454 542 429
           C527 413 521 397 524 377
           C522 385 519 394 515 402Z"
        fill="#52F3F2" filter="url(#softGlow)"/>

  <!-- inner lower flame hollow/notch made by badge color to mimic original silhouette -->
  <path d="M512 538
           C496 522 492 506 499 488
           C479 505 469 525 469 545
           C469 570 488 586 512 586
           C536 586 555 570 555 545
           C555 525 545 505 525 488
           C532 506 528 522 512 538Z"
        fill="#05070D" opacity="0.98"/>

  <!-- brand text -->
  <text x="512" y="765"
        text-anchor="middle"
        fill="#F4F0F6"
        font-family="Inter, Arial, Helvetica, sans-serif"
        font-size="112"
        font-weight="700"
        letter-spacing="-4"
        filter="url(#textSoft)">CraveShield</text>
</svg>
